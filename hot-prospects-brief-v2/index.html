<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Prospects Brief v2</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script>
    (function() {
      try {
        var stored = localStorage.getItem('hpb-v2-theme');
        var theme;
        if (stored === 'dark' || stored === 'light') {
          theme = stored;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = 'dark';
        } else {
          theme = 'light';
        }
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {
        // localStorage unavailable (incognito, sandboxed) — fall through to light mode
      }
    })();
  </script>
  <style>
    /* ── Elevate Design Tokens ─────────────────────────────────────────────── */
    :root {
      color-scheme: light;
      --primary:       #5746b2;
      --primary-hover: #4535a0;
      --primary-20:    #ebe9f6;
      --primary-10:    #f5f3fb;
      --neutral-5:     #fafafa;
      --card:          #fff;
      --border-light:  #e5e3f0;
      --border-med:    #b0afb6;
      --border-brand:  #ddd8f8;
      --text:          #1a1a2e;
      --text-sec:      #49495a;
      --text-ter:      #8b8fa8;
      --text-pri:      #5746b2;
      --r-sm:          8px;
      --r-md:          12px;
      --r-pill:        20px;
      --sh-card:       0 0 1px rgba(32,31,35,.18), 0 2px 8px rgba(32,31,35,.06);
      --sh-dd:         0 8px 24px rgba(0,0,0,.12), 0 0 1px rgba(32,31,35,.14);
      --font:          'Figtree', system-ui, sans-serif;
      --surface:       #f5f4fb;
       --error-bg:      #fdecec;
       --error-text:    #8a1f1f;
       --error-border:  #f3c1c1;
       --success-bg:    #e8f5e9;
       --success-text:  #2e7d32;
       --toast-bg:         #1a1a2e;
       --toast-text:       #fff;
       --st-overlay-hot:   rgba(87,70,178,0.15);
       --st-overlay-warm:  rgba(87,70,178,0.06);
       /* Signal Pill Tokens — Light Mode */
       --sig-profile-bg:     #f0f0f5;
       --sig-profile-text:   #49495a;
       --sig-pricing-bg:     #fde8e8;
       --sig-pricing-text:   #8a1f1f;
       --sig-compare-bg:     #e3edff;
       --sig-compare-text:   #1a4480;
       --sig-category-bg:    #ebe9f6;
       --sig-category-text:  #5746b2;
       --sig-competitors-bg: #fff0d9;
       --sig-competitors-text:#7a4d00;
     }

    /* ── Dark Mode Theme ──────────────────────────────────────────────────── */
    :root[data-theme="dark"] {
      color-scheme: dark;
      --primary:       #8b7fd1;
      --primary-hover: #a796e0;
      --primary-10:    #1f1a3d;
      --primary-20:    #2d2654;
      --neutral-5:     #1a1632;
      --card:          #1c1832;
      --border-light:  #2a2640;
      --border-med:    #3a3658;
      --border-brand:  #4a3d8c;
      --text:          #f0f0f5;
      --text-sec:      #b0afc8;
      --text-ter:      #7a7894;
      --text-pri:      #8b7fd1;
      --surface:       #100c2e;
      --success-bg:    rgba(127,198,133,.18);
      --success-text:  #7fc685;
      --error-bg:      rgba(240,160,160,.18);
      --error-text:    #f0a0a0;
      --error-border:  #5a2424;
      --sh-card:       0 0 1px rgba(0,0,0,.4), 0 2px 8px rgba(0,0,0,.3);
      --sh-dd:         0 8px 24px rgba(0,0,0,.5), 0 0 1px rgba(0,0,0,.6);
      --toast-bg:      #2a2640;
      --toast-text:    #f0f0f5;
      --st-overlay-hot:  rgba(139,127,209,0.18);
      --st-overlay-warm: rgba(139,127,209,0.10);
      /* Signal Pill Tokens — Dark Mode */
      --sig-profile-bg:     rgba(176,175,200,0.15);
      --sig-profile-text:   #b0afc8;
      --sig-pricing-bg:     rgba(240,160,160,0.15);
      --sig-pricing-text:   #f0a0a0;
      --sig-compare-bg:     rgba(120,170,255,0.15);
      --sig-compare-text:   #a0c4ff;
      --sig-category-bg:    rgba(139,127,209,0.18);
      --sig-category-text:  #a796e0;
      --sig-competitors-bg: rgba(255,180,100,0.15);
      --sig-competitors-text:#ffc880;
    }

    /* ── Dark Mode Contrast Overrides (a11y fixes) ──────────────────────── */
     [data-theme="dark"] .chip[aria-pressed="true"] {
       background: var(--primary-hover);
       color: var(--surface);
     }
     [data-theme="dark"] .nav-item.active {
       color: var(--primary-hover);
     }
     [data-theme="dark"] .view-alex > h2,
     [data-theme="dark"] .view-alex h2 {
       color: var(--text-sec);
     }
     [data-theme="dark"] .fit-badge--strong {
       background: var(--primary-hover);
       color: var(--surface);
     }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--surface); color: var(--text); font-size: 14px; }
    button { font-family: var(--font); cursor: pointer; }
    a { color: var(--text-pri); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .mi { font-family: 'Material Icons'; font-size: 18px; line-height: 1; vertical-align: middle;
          display: inline-flex; align-items: center; justify-content: center; user-select: none; flex-shrink: 0; }

    /* ── Shell ────────────────────────────────────────────────────────────── */
    .shell      { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .shell-body { display: flex; flex: 1; min-height: 0; }
    .main-area  { flex: 1; overflow-y: auto; min-height: 0; background: var(--surface); }
    .main-area::-webkit-scrollbar { width: 4px; }
    .main-area::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

    /* ── Top Bar ──────────────────────────────────────────────────────────── */
    .top-bar { background: var(--primary); height: 48px; display: flex; align-items: center;
               padding: 0 20px; gap: 12px; flex-shrink: 0; }
    .top-bar-logo { color: #fff; font-weight: 800; font-size: 15px; letter-spacing: -.2px; }
    .top-bar-search { flex: 1; max-width: 300px; margin: 0 auto; height: 30px;
                      display: flex; align-items: center; gap: 6px;
                      background: rgba(255,255,255,.12); border-radius: var(--r-sm);
                      padding: 0 10px; border: 1px solid rgba(255,255,255,.1); }
    .top-bar-search-text { font-size: 12px; color: rgba(255,255,255,.5); flex: 1; }
    .top-bar-actions { margin-left: auto; display: flex; align-items: center; gap: 2px; }
     .top-bar-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
                     border-radius: var(--r-sm); color: rgba(255,255,255,.65); background: none; border: none; transition: background .12s; }
     .top-bar-icon:hover { background: rgba(255,255,255,.14); }
     .top-bar-icon:focus-visible { outline: 2px solid #fff; outline-offset: -2px; }
     .theme-toggle {
       width: 30px; height: 30px;
       display: flex; align-items: center; justify-content: center;
       border-radius: var(--r-sm);
       color: rgba(255,255,255,.65);
       background: none; border: none;
       transition: background .12s;
     }
    .theme-toggle:hover { background: rgba(255,255,255,.14); }
    .theme-toggle:focus-visible { outline: 2px solid #fff; outline-offset: -2px; }
    .top-bar-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,.2);
                      display: flex; align-items: center; justify-content: center;
                      font-size: 11px; font-weight: 700; color: #fff; margin-left: 4px; }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    .sidebar { width: 140px; background: var(--card); border-right: 0.5px solid var(--border-light);
               display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { padding: 10px 12px; border-bottom: 0.5px solid var(--border-light);
                    display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .sidebar-logomark { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0;
                        background: linear-gradient(135deg,#ff6b35,#f7931e);
                        display: flex; align-items: center; justify-content: center;
                        font-size: 9px; font-weight: 800; color: #fff; }
    .sidebar-orgname { font-size: 12px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 4px 0; }
    .nav-item { display: block; width: 100%; text-align: left; padding: 6px 12px; font-size: 12px;
                font-weight: 500; color: var(--text-sec); background: none; border: none;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                transition: background .1s, color .1s; font-family: var(--font); cursor: pointer; }
     .nav-item:hover { background: var(--primary-10); color: var(--text-pri); }
     .nav-item:focus-visible { outline: 2px solid var(--primary); outline-offset: -2px; background: var(--primary-10); }
     .nav-item.parent { font-weight: 700; color: var(--text); }
     .nav-item.active { background: var(--primary-20); color: var(--text-pri); font-weight: 700; }
    .nav-sub { border-left: 0.5px solid var(--border-light); margin-left: 12px; }

    /* ── Page Header ──────────────────────────────────────────────────────── */
    .page-header { background: var(--card); border-bottom: 0.5px solid var(--border-light);
                   padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-shrink: 0; }
    .page-header-left { display: flex; flex-direction: column; gap: 2px; }
    .page-header h1 { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -.3px; }
    .page-header .subtitle { font-size: 12px; color: var(--text-sec); }

    /* ── Persona Switcher ─────────────────────────────────────────────────── */
    .persona-switcher { height: 32px; padding: 0 10px; border: 1px solid var(--border-light);
                        border-radius: var(--r-sm); font-family: var(--font); font-size: 12px;
                        font-weight: 600; color: var(--text); background: var(--card);
                        cursor: pointer; max-width: 220px; }
     .persona-switcher:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    /* ── Filter Bar ───────────────────────────────────────────────────────── */
    .filter-bar { background: var(--card); border-bottom: 0.5px solid var(--border-light);
                  padding: 10px 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
     .filter-label { font-size: 11px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; }
    .filter-sep { width: 1px; height: 20px; background: var(--border-light); margin: 0 4px; }
    .chip { height: 28px; padding: 0 12px; border-radius: var(--r-pill); border: 1px solid var(--border-light);
            background: var(--card); color: var(--text-sec); font-family: var(--font); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all .12s; display: inline-flex; align-items: center; gap: 4px; }
    .chip:hover { border-color: var(--primary); color: var(--text-pri); }
    .chip[aria-pressed="true"] { background: var(--primary); color: #fff; border-color: var(--primary); }
    .chip:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    /* ── Fit Badges ───────────────────────────────────────────────────────── */
    .fit-badge { display: inline-flex; align-items: center; height: 20px; padding: 0 8px;
                 border-radius: var(--r-pill); font-size: 11px; font-weight: 700; white-space: nowrap; }
    .fit-badge--strong { background: var(--primary); color: #fff; }
    .fit-badge--partial { background: var(--primary-20); color: var(--text-pri); }
    .fit-badge--weak { background: var(--neutral-5); color: var(--text-sec); border: 1px solid var(--border-light); }
    .fit-unknown { color: var(--text-ter); font-size: 13px; }

    /* ── Score Badge ──────────────────────────────────────────────────────── */
    .score-badge { display: inline-flex; align-items: center; justify-content: center;
                   min-width: 36px; height: 28px; padding: 0 8px; border-radius: var(--r-sm);
                   background: var(--primary-10); color: var(--primary); font-weight: 800; font-size: 15px; }

     /* ── Empty State ──────────────────────────────────────────────────────── */
     .empty-state { padding: 48px 24px; text-align: center; color: var(--text-sec); font-size: 14px; }

     /* ── View Visibility (CSS-driven) ─────────────────────────────────────── */
     .view-francisco, .view-stacy, .view-iesha, .view-alex, .view-maya { display: none; }
     [data-persona="francisco"] .view-francisco { display: block; }
     [data-persona="stacy"]     .view-stacy     { display: block; }
     [data-persona="maya"]      .view-maya      { display: block; }

    /* ── Francisco View ───────────────────────────────────────────────────── */
    .view-francisco { background: var(--surface); }
    .fr-row { display: grid; grid-template-columns: 1fr 48px 120px 80px 2fr; align-items: center; gap: 12px;
               padding: 12px 24px; border-bottom: 1px solid var(--border-light); background: var(--card);
               cursor: pointer; transition: background .1s; }
    .fr-row:hover { background: var(--primary-10); }
    .fr-row:focus-visible { outline: 2px solid var(--primary); outline-offset: -2px; }
    .fr-company { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .fr-company-name { font-weight: 700; color: var(--text); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
     .fr-company-domain { font-size: 11px; color: var(--text-sec); }
    .fr-signal { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-sec); font-weight: 600; }
    .fr-why { font-size: 12px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    @media (max-width: 768px) {
      .fr-row { grid-template-columns: 1fr auto; }
      .fr-signal, .fr-why { display: none; }
    }

    /* ── Stacy View ───────────────────────────────────────────────────────── */
    .view-stacy { padding: 24px; }
    .st-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
     .st-segment { background: var(--card); border-radius: var(--r-md); box-shadow: var(--sh-card);
                   overflow: hidden; cursor: pointer; transition: box-shadow .15s; }
     .st-segment:hover { box-shadow: var(--sh-dd); }
     .st-segment:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .st-segment-header { padding: 16px; position: relative; }
    .st-label { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .st-meta { display: flex; align-items: center; gap: 12px; }
    .st-heat { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: var(--r-pill); }
    .st-heat--hot  { background: rgba(87,70,178,.15); color: var(--primary); }
    .st-heat--warm { background: rgba(87,70,178,.06); color: var(--text-sec); }
    .st-heat--cool { background: var(--neutral-5); color: var(--text-ter); }
    .st-count { font-size: 12px; color: var(--text-sec); }
     .st-avg   { font-size: 12px; color: var(--text-sec); }
    .st-companies { border-top: 1px solid var(--border-light); max-height: 300px; overflow-y: auto; }
    .st-overlay--hot  { background: var(--st-overlay-hot); }
    .st-overlay--warm { background: var(--st-overlay-warm); }

    /* ── Iesha View ───────────────────────────────────────────────────────── */
     [data-persona="iesha"] .view-iesha { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
    .ie-section { background: var(--card); border-radius: var(--r-md); box-shadow: var(--sh-card); padding: 20px; }
    .ie-section-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
    .ie-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .ie-bar-label { font-size: 12px; color: var(--text-sec); width: 140px; flex-shrink: 0; }
    .ie-bar-track { flex: 1; height: 8px; background: var(--border-light); border-radius: 4px; overflow: hidden; }
    .ie-bar-fill { height: 100%; border-radius: 4px; }
    .ie-bar-fill--intent { background: var(--primary); }
    .ie-bar-fill--fit    { background: var(--primary-20); }
    .ie-bar-value { font-size: 12px; font-weight: 700; color: var(--text); width: 36px; text-align: right; }
    .ie-breakdown { border: 1px solid var(--border-light); border-radius: var(--r-sm); padding: 12px; margin-bottom: 10px; }
    .ie-breakdown-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .ie-breakdown-name { font-size: 13px; font-weight: 700; color: var(--text); }
     .ie-formula { font-size: 11px; color: var(--text-sec); font-family: monospace; margin: 8px 0 6px; }
    .ie-dims { display: flex; gap: 8px; flex-wrap: wrap; }
    .ie-dim { font-size: 11px; padding: 1px 6px; border-radius: 3px; }
     .ie-dim--match   { background: var(--success-bg); color: var(--success-text); }
     .ie-dim--nomatch { background: var(--error-bg); color: var(--error-text); }
    .ie-dim--unknown { background: var(--neutral-5); color: var(--text-ter); }
    .ie-math-card { font-size: 13px; line-height: 1.7; }
    .ie-math-card code { background: var(--neutral-5); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
     .ie-icp-list { margin-top: 8px; font-size: 12px; color: var(--text-sec); }
     .ie-agg-note { font-size: 12px; color: var(--text-sec); margin-top: 8px; }
     .ie-bar-row--breakdown { margin-bottom: 4px; }
     .ie-bar-label--narrow { width: 120px; }
     .ax-fit-spacing { margin-top: 4px; }

     /* ── Alex View ────────────────────────────────────────────────────────── */
     [data-persona="alex"] .view-alex { padding: 32px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .view-alex h2 { font-size: 14px; font-weight: 700; color: var(--text-ter); text-transform: uppercase; letter-spacing: .8px; }
    .ax-hero { background: var(--card); border-radius: var(--r-md); box-shadow: var(--sh-dd);
               padding: 24px; width: 100%; max-width: 680px; transition: opacity .3s; }
    .ax-hero.contacted { opacity: 0.45; }
    .ax-hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 8px; }
    .ax-company { font-size: 22px; font-weight: 800; color: var(--text); }
    .ax-score { font-size: 36px; font-weight: 800; color: var(--primary); line-height: 1; }
    .ax-why { font-size: 14px; color: var(--text-sec); margin: 8px 0 16px; }
    .ax-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .ax-btn { height: 32px; padding: 0 12px; border-radius: var(--r-sm); border: 1px solid var(--border-light);
              background: var(--card); color: var(--text-sec); font-family: var(--font); font-size: 12px; font-weight: 600;
              display: inline-flex; align-items: center; gap: 6px; cursor: pointer; transition: all .12s; }
    .ax-btn:hover { border-color: var(--primary); color: var(--text-pri); background: var(--primary-10); }
    .ax-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .ax-placeholder { background: var(--surface); border: 1.5px dashed var(--border-med); border-radius: var(--r-md);
                      padding: 24px; width: 100%; max-width: 680px; text-align: center; color: var(--text-ter); font-size: 13px; }

    /* ── Maya View ────────────────────────────────────────────────────────── */
    .view-maya { background: var(--surface); }
    .my-section-header { padding: 12px 24px 8px; font-size: 11px; font-weight: 700; text-transform: uppercase;
                         letter-spacing: .6px; color: var(--text-ter); background: var(--surface); }
    .my-row { display: grid; grid-template-columns: 1fr 48px 120px 2fr 90px; align-items: center; gap: 12px;
               padding: 10px 24px; border-bottom: 1px solid var(--border-light); background: var(--card); }
     .my-recency { font-size: 11px; color: var(--text-sec); text-align: right; }
    .my-row[data-recent="true"] { background: var(--primary-10); }

    /* ── Toast ────────────────────────────────────────────────────────────── */
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999;
             background: var(--toast-bg); color: var(--toast-text); padding: 10px 16px;
             border-radius: var(--r-sm); font-size: 13px; font-weight: 600;
             box-shadow: var(--sh-dd); pointer-events: none;
             animation: toast-in .2s ease; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ── Theme Transitions (respects reduced-motion) ──────────────────────── */
    @media (prefers-reduced-motion: no-preference) {
      body, .top-bar, .sidebar, .page-header, .filter-bar,
      .fr-row, .my-row, .ax-hero, .st-segment, .ie-section, .ie-breakdown,
      .chip, .fit-badge, .ax-btn, .toast, .score-badge,
      .nav-item, .top-bar-icon, .theme-toggle, .ie-bar-fill, .ie-bar-track {
        transition: background-color 200ms ease, color 200ms ease,
                    border-color 200ms ease, box-shadow 200ms ease;
      }
    }

    /* ── Reduced Motion Override (disable all transitions) ──────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    /* ── Responsive ───────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .filter-bar { padding: 8px 16px; }
      .st-grid { grid-template-columns: 1fr; }
      .ax-hero { padding: 16px; }
    }

    /* ── v2: Summary Stats ────────────────────────────────────────────────── */

    // ── Scoring Functions ──────────────────────────────────────────────────
    function dimensionMatch(value, rule) {
      if (value === null || value === undefined) return 'unknown';
      if (rule && typeof rule === 'object' && !Array.isArray(rule)) {
        const { min, max } = rule;
        const n = Number(value);
        if (isNaN(n)) return 'unknown';
        return (min == null || n >= min) && (max == null || n <= max) ? 'match' : 'no-match';
      }
      if (Array.isArray(rule)) {
        if (Array.isArray(value)) {
          const lv = value.map(v => String(v).toLowerCase());
          const lr = rule.map(r => String(r).toLowerCase());
          return lv.some(v => lr.includes(v)) ? 'match' : 'no-match';
        }
        return rule.map(r => String(r).toLowerCase()).includes(String(value).toLowerCase()) ? 'match' : 'no-match';
      }
      return 'unknown';
    }

    function computeFit(company, icp) {
      const dims = [
        { name: 'size',     value: company.company_employees,  rule: icp.size },
        { name: 'industry', value: company.company_industry,   rule: icp.industries },
        { name: 'geo',      value: company.geo_region,         rule: icp.geo },
        { name: 'persona',  value: company.personas_detected,  rule: icp.personas },
      ];
      const results = {};
      let matchCount = 0, unknownCount = 0;
      const matches = [], missingDims = [];
      for (const d of dims) {
        const r = dimensionMatch(d.value, d.rule);
        results[d.name] = r;
        if (r === 'match') { matchCount++; matches.push(d.name); }
        else if (r === 'unknown') { unknownCount++; missingDims.push(d.name); }
      }
      let tier;
      if ((results.size === 'unknown' && results.industry === 'unknown') || unknownCount === 4) tier = 'Unknown';
      else if (matchCount >= 3 && (results.size !== 'unknown' || results.industry !== 'unknown')) tier = 'Strong';
      else if (matchCount >= 1) tier = 'Partial';
      else if (matchCount === 0 && unknownCount === 0) tier = 'Weak';
      else tier = 'Unknown';
      const score = tier === 'Strong' ? 100 : tier === 'Partial' ? 25 + matchCount * 25 : tier === 'Weak' ? 25 : null;
      return { tier, score, matches, missingDims };
    }

    function computeComposite(company, icp) {
      const intent = company.company_intent_score;
      const fit = computeFit(company, icp);
      let composite, formula;
      if (fit.score === null) {
        composite = intent;
        formula = 'intent only (fit unknown): ' + intent;
      } else {
        composite = Math.round(intent * 0.6 + fit.score * 0.4);
        formula = intent + '×0.6 + ' + fit.score + '×0.4 = ' + composite;
      }
      return { composite, intent, fit, formula };
    }

    // ── computeWhyCallV2 — Rich why-call format ─────────────────────────
    // Format: "{N,NNN} employees · {verb} ({count}x in last 7 days)"
    // Falls back to just the verb if employees is null
    // Falls back to "Active on G2 recently" if no recent signals
    const SIGNAL_PRIORITY_V2 = {
      pricing: 1.0,
      compare: 0.9,
      competitors: 0.7,
      category: 0.5,
      profile: 0.3
    };

    const SIGNAL_VERB = {
      pricing: 'researching pricing',
      compare: 'running comparisons',
      competitors: 'researching competitors',
      profile: 'viewing profile'
    };

    function computeWhyCallV2(company, mockNow) {
      const now = mockNow instanceof Date ? mockNow : new Date(mockNow);
      const cutoff = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
      const signals = company.recent_signals || [];

      const recent = signals.filter(s => new Date(s.last_seen) >= cutoff);

      if (recent.length === 0) {
        return 'Active on G2 recently';
      }

      const dominant = recent.reduce(function(best, s) {
        if (!best) return s;
        const bestPri = SIGNAL_PRIORITY_V2[best.type] || 0;
        const sPri = SIGNAL_PRIORITY_V2[s.type] || 0;
        if (sPri > bestPri) return s;
        if (sPri === bestPri && s.count > best.count) return s;
        return best;
      }, null);

      var verb;
      if (dominant.type === 'category') {
        var industry = (company.company_industry || 'category') + ' page';
        verb = 'browsing ' + industry;
      } else {
        verb = SIGNAL_VERB[dominant.type] || dominant.type;
      }

      var tail = verb + ' (' + dominant.count + 'x in last 7 days)';
      tail = tail.charAt(0).toUpperCase() + tail.slice(1);

      if (company.company_employees != null) {
        var empStr = company.company_employees.toLocaleString('en-US');
        return empStr + ' employees · ' + tail.charAt(0).toLowerCase() + tail.slice(1);
      }

      return tail;
    }

     function recencyLabel(lastSeen, refDate) {
       const diff = new Date(refDate) - new Date(lastSeen);
       const days = Math.floor(diff / (1000 * 60 * 60 * 24));
       if (days === 0) return 'today';
       if (days === 1) return '1 day ago';
       if (days < 7) return days + ' days ago';
       const weeks = Math.floor(days / 7);
       return weeks + (weeks === 1 ? ' week ago' : ' weeks ago');
     }

    // ── Helper: size bucket ──────────────────────────────────────────────
    function sizeBucket(employees) {
      if (employees == null) return 0;
      if (employees < 200) return 0;
      if (employees < 5000) return 1;
      return 2;
    }

    function withinLast7Days(lastSeen, refDate) {
      const cutoff = new Date(new Date(refDate).getTime() - 7 * 24 * 60 * 60 * 1000);
      return new Date(lastSeen) >= cutoff;
    }

    // ── applyFilters ─────────────────────────────────────────────────────
    function applyFilters(enriched, activePresets, activeSignals, activeFits) {
      const NOW = new Date(MOCK_NOW);
      const cutoff = new Date(NOW.getTime() - 7 * 24 * 60 * 60 * 1000);
      return enriched.filter(c => {
        const signalOk = activeSignals.includes(c.signal_type);

        const tier = c._fit.tier;
        const fitOk = activeFits.includes(tier) || (activeFits.includes('Weak') && tier === 'Unknown');

        let presetOk = true;
        if (activePresets.includes('hot')) {
          presetOk = presetOk && c._comp.composite >= 80;
        }
        if (activePresets.includes('pricing')) {
          presetOk = presetOk && c.recent_signals.some(s => s.type === 'pricing' && new Date(s.last_seen) >= cutoff);
        }
        if (activePresets.includes('comparison')) {
          presetOk = presetOk && c.recent_signals.some(s => (s.type === 'compare' || s.type === 'competitors') && new Date(s.last_seen) >= cutoff);
        }
        if (activePresets.includes('enterprise')) {
          presetOk = presetOk && c.company_employees != null && c.company_employees >= 5000;
        }
        if (activePresets.includes('midmarket')) {
          presetOk = presetOk && c.company_employees != null && c.company_employees >= 200 && c.company_employees < 5000;
        }
        if (activePresets.includes('smb')) {
          presetOk = presetOk && (c.company_employees == null || c.company_employees < 200);
        }
        return signalOk && fitOk && presetOk;
      });
    }

    function getPersonaCompanies(persona, filtered) {
      const sortedByComposite = [...filtered].sort((a, b) =>
        b._comp.composite - a._comp.composite || b.company_intent_score - a.company_intent_score
      );

      if (persona === 'francisco' || persona === 'iesha') {
        return sortedByComposite;
      }
      if (persona === 'stacy') {
        return [...filtered].sort((a, b) => {
          const indCmp = (a.company_industry || 'Unknown').localeCompare(b.company_industry || 'Unknown');
          if (indCmp !== 0) return indCmp;
          const sizeCmp = sizeBucket(a.company_employees) - sizeBucket(b.company_employees);
          if (sizeCmp !== 0) return sizeCmp;
          return b._comp.composite - a._comp.composite;
        });
      }
      if (persona === 'alex') {
        return sortedByComposite.slice(0, 3);
      }
      if (persona === 'maya') {
        return [...filtered].filter(c => c.company_employees == null || c.company_employees < 200)
          .sort((a, b) => {
            const al = (latestSignal(a) || {}).last_seen || '0';
            const bl = (latestSignal(b) || {}).last_seen || '0';
            const cmp = String(bl).localeCompare(String(al));
            if (cmp !== 0) return cmp;
            return b._comp.composite - a._comp.composite;
          });
      }
      return sortedByComposite;
    }

          <h2>Scoring Formula</h2>
          <p>When fit known: <code>composite = intent × 0.6 + fit × 0.4</code></p>
          <p>When fit unknown: <code>composite = intent</code> (no penalty for missing data)</p>
          <p>Fit tiers: Strong = 100 · Partial(2) = 75 · Partial(1) = 50 · Weak = 25 · Unknown = intent only</p>
          <p>Current ICP: Mid-Market (200–4,999 employees) · Software & Technology, Financial Services, Retail &amp; E-Commerce · AMER, EMEA</p>
        </div>
      );
    }

    // ── Card ─────────────────────────────────────────────────────────────
    function Card({ company, rank, persona, isExpanded, onExpand, onAction, extraClass }) {
      const isHot = company._comp.composite >= 80;
      const heatBand = company._comp.composite >= 80 ? 'hot' : company._comp.composite >= 40 ? 'warm' : 'cool';
      const segCode = sizeBucket(company.company_employees);
      const seg = segCode === 0 ? 'SMB' : segCode === 1 ? 'Mid-market' : 'Enterprise';
      const NOW = new Date(MOCK_NOW);
      const cutoff = new Date(NOW.getTime() - 7 * 24 * 60 * 60 * 1000);
      const recentPillTypes = Array.from(new Set(
        (company.recent_signals || [])
          .filter(s => new Date(s.last_seen) >= cutoff)
          .map(s => s.type)
      ));

      const cardCls = 'card' +
        (isHot ? ' card--hot' : '') +
        (persona === 'alex' ? ' card--alex' : '') +
        (extraClass ? ' ' + extraClass : '');

      const detailId = 'ie-detail-' + rank;

      const ScoreArea = () => (
        <span className="score-area">
          <span className="score-badge-v2">{company._comp.composite}</span>
          <span className="score-label">intent</span>
          <span className={`score-underline score-underline--${heatBand}`} aria-hidden="true" />
        </span>
      );

      return (
        <li className={cardCls} aria-label={`Rank ${rank}: ${company.company_name}, score ${company._comp.composite}`}>
          <div className="card-body">
            <div className="card-header">
              <div className="card-header-left">
                <span className="card-rank">#{rank}</span>
                <div className="card-name-block">
                  <h3 className="card-name">{company.company_name}</h3>
                  <a className="card-domain" href={`https://${company.company_domain}`}>{company.company_domain}</a>
                </div>
              </div>
              {persona === 'iesha' ? (
                <button className="ie-expand-toggle"
                  aria-expanded={String(isExpanded)}
                  aria-controls={detailId}
                  onClick={() => onExpand(company.company_name)}>
                  <ScoreArea />
                </button>
              ) : <ScoreArea />}
            </div>

            <div className="card-middle">
              <div className="card-fit"><FitBadge tier={company._fit.tier} /></div>
              <div className="signal-pills">
                {recentPillTypes.length > 0 ? recentPillTypes.map(type => (
                  <span key={type} className={`pill pill--${type}`}>
                    <span className="mi" aria-hidden="true">{(SIGNAL_META[type] || {}).icon || 'circle'}</span>
                    {type}
                  </span>
                )) : (
                  <span className="pill pill--profile">
                    <span className="mi" aria-hidden="true">visibility</span>
                    profile
                  </span>
                )}
              </div>
              <p className="why-call"><strong>Why call:</strong> {company._whyV2}</p>
            </div>

            <div className="card-footer">
              <span className="segment-badge">{seg}</span>
              <div className="actions-row">
                <button className="action-btn" onClick={() => onAction('Added to CRM ✓')}>
                  <span className="mi" aria-hidden="true">person_add</span> Add to CRM
                </button>
                <button className="action-btn" onClick={() => onAction('Draft email opened')}>
                  <span className="mi" aria-hidden="true">email</span> Email
                </button>
              </div>
            </div>

            {persona === 'iesha' && isExpanded && (
              <div className="ie-expanded-content" id={detailId}>
                <div className="ie-bar-row-v2">
                  <span className="ie-bar-label">Intent ({company.company_intent_score})</span>
                  <div className="ie-bar-track"><div className="ie-bar-fill ie-fill-intent" style={{width: `${company.company_intent_score * 0.6}%`}} /></div>
                  <span className="ie-bar-value">{Math.round(company.company_intent_score * 0.6)}</span>
                </div>
                {company._fit.score !== null && (
                  <div className="ie-bar-row-v2">
                    <span className="ie-bar-label">Fit ({company._fit.score})</span>
                    <div className="ie-bar-track"><div className="ie-bar-fill ie-fill-fit" style={{width: `${company._fit.score * 0.4}%`}} /></div>
                    <span className="ie-bar-value">{Math.round(company._fit.score * 0.4)}</span>
                  </div>
                )}
                <p className="ie-formula-v2">{company._comp.formula}</p>
                <div className="ie-dims">
                  {['size','industry','geo','persona'].map(dim => {
                    const isMatch = company._fit.matches.includes(dim);
                    const isMissing = company._fit.missingDims.includes(dim);
                    const cls = isMatch ? 'ie-dim-chip--match' : isMissing ? 'ie-dim-chip--unknown' : 'ie-dim-chip--nomatch';
                    const sym = isMatch ? '✓' : isMissing ? '?' : '✗';
                    return <span key={dim} className={`ie-dim-chip ${cls}`}>{sym} {dim}</span>;
                  })}
                </div>
              </div>
            )}
          </div>
        </li>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────
    function App() {
      const [persona, setPersona] = React.useState('francisco');
      const [activePresets, setActivePresets] = React.useState([]);
      const [activeSignals, setActiveSignals] = React.useState(['profile','pricing','compare','category','competitors']);
      const [activeFits, setActiveFits] = React.useState(['Strong','Partial','Weak']);
      const [expandedCards, setExpandedCards] = React.useState({});
      const [toast, setToast] = React.useState(null);

      const [theme, setTheme] = React.useState(function() {
        return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      });

      function toggleTheme() {
        setTheme(function(prev) {
          var next = prev === 'dark' ? 'light' : 'dark';
          try { localStorage.setItem('hpb-v2-theme', next); }
          catch (e) { /* ignore */ }
          return next;
        });
      }

      React.useEffect(function() {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
      }, [theme]);

      React.useEffect(function() {
        var mql = window.matchMedia('(prefers-color-scheme: dark)');
        function handler(e) {
          try {
            if (!localStorage.getItem('hpb-v2-theme')) {
              setTheme(e.matches ? 'dark' : 'light');
            }
          } catch (e2) { /* ignore */ }
        }
        mql.addEventListener('change', handler);
        return function() { mql.removeEventListener('change', handler); };
      }, []);

      function showToast(msg) {
        setToast(msg);
        setTimeout(() => setToast(null), 2500);
      }

      function onPersonaChange(newPersona) {
        setPersona(newPersona);
        setActiveSignals(['profile','pricing','compare','category','competitors']);
        setActiveFits(['Strong','Partial','Weak']);
        if (newPersona === 'maya') {
          setActivePresets(['smb']);
        } else {
          setActivePresets([]);
        }
        setExpandedCards({});
      }

      // Enrich all companies (full dataset, used for SummaryStats)
      const enriched = MOCK_DATA.map(c => ({
        ...c,
        _fit: computeFit(c, DEFAULT_ICP),
        _comp: computeComposite(c, DEFAULT_ICP),
        _whyV2: computeWhyCallV2(c, new Date(MOCK_NOW)),
      }));

      const filtered = applyFilters(enriched, activePresets, activeSignals, activeFits);
      const companies = getPersonaCompanies(persona, filtered);

      function isNewIndustry(idx) {
        if (persona !== 'stacy' || idx === 0) return false;
        return companies[idx].company_industry !== companies[idx - 1].company_industry;
      }

      const emptyMsg = persona === 'maya'
        ? 'No SMB companies in current data.'
        : persona === 'alex'
          ? 'No more prospects match your filters.'
          : 'No companies match current filters. Try adjusting the filters above.';

      return (
        <div className="shell">
          <TopBar theme={theme} onToggleTheme={toggleTheme} />
          <div className="shell-body">
            <Sidebar />
            <div className="main-area">
              <header className="page-header">
                <div className="page-header-left">
                  <h1>Hot Prospects Brief v2</h1>
                  <span className="subtitle">Ranked by composite intent + ICP fit score · {filtered.length} companies</span>
                </div>
                <select className="persona-switcher" value={persona}
                  onChange={e => onPersonaChange(e.target.value)}
                  aria-label="Switch persona view">
                  <option value="francisco">Francisco (SDR)</option>
                  <option value="stacy">Stacy (Demand Gen / ABM)</option>
                  <option value="iesha">Iesha (RevOps / SalesOps)</option>
                  <option value="alex">Alex (Founder / Player-Coach)</option>
                  <option value="maya">Maya (SMB Growth)</option>
                </select>
              </header>
              <SummaryStats enriched={enriched} />
              <FilterBar
                activePresets={activePresets} setActivePresets={setActivePresets}
                activeSignals={activeSignals} setActiveSignals={setActiveSignals}
                activeFits={activeFits} setActiveFits={setActiveFits}
              />
              <main data-persona={persona}>
                {persona === 'iesha' && (
                  <div className="cards-container">
                    <IeshaMathCard />
                  </div>
                )}
                {companies.length === 0 ? (
                  <div className="empty-state">{emptyMsg}</div>
                ) : (
                  <div className="cards-container">
                    <ol className="cards-list">
                      {companies.map((c, idx) => (
                        <Card key={c.company_name}
                          company={c}
                          rank={idx + 1}
                          persona={persona}
                          isExpanded={!!expandedCards[c.company_name]}
                          onExpand={name => setExpandedCards(prev => ({...prev, [name]: !prev[name]}))}
                          onAction={showToast}
                          extraClass={isNewIndustry(idx) ? 'stacy-divider' : ''}
                        />
                      ))}
                      {persona === 'alex' && companies.length > 0 && companies.length < 3 && (
                        <li className="card-placeholder">No more prospects match your filters.</li>
                      )}
                    </ol>
                  </div>
                )}
              </main>
              {toast && <div className="toast" role="status" aria-live="polite">{toast}</div>}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
